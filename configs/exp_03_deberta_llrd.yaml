experiment_name: exp_03_deberta_llrd
pipeline: direct

encoder:
  model_name: microsoft/deberta-v3-base
  num_labels: 5
  max_len: 256
  use_crf: false
  dropout: 0.1

loss:
  type: focal
  gamma: 2.0

optimizer:
  base_lr: 3.0e-5
  weight_decay: 0.01
  use_llrd: true
  llrd_decay: 0.9

training:
  epochs: 20
  batch_size: 16
  eval_batch_size: 32
  warmup_ratio: 0.1
  grad_clip: 1.0
  seed: 42
  num_workers: 2
  bf16: false   # DeBERTa-v3 is unstable under bf16 autocast (NaN losses); train in fp32.

data:
  train_path: datasets/new_train_data.csv
  dev_path:   datasets/new_dev_data.csv

output_dir: out/experiments/exp_03_deberta_llrd
