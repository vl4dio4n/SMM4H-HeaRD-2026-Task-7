# Exp 06 — seed 123 member of the CRF ensemble. Same arch as Exp 04.
experiment_name: exp_06_ensemble_seed_123
pipeline: direct

encoder:
  model_name: microsoft/deberta-v3-base
  num_labels: 5
  max_len: 256
  use_crf: true
  dropout: 0.1

loss:
  type: ce  # ignored by CRF

optimizer:
  base_lr: 3.0e-5
  weight_decay: 0.01
  use_llrd: true
  llrd_decay: 0.9

training:
  epochs: 25
  batch_size: 16
  eval_batch_size: 32
  warmup_ratio: 0.1
  grad_clip: 1.0
  seed: 123
  num_workers: 2
  bf16: false

data:
  train_path: datasets/new_train_data.csv
  dev_path:   datasets/new_dev_data.csv

output_dir: out/experiments/exp_06_ensemble/seed_123
