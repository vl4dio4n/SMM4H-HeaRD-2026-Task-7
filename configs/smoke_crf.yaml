experiment_name: smoke_crf
pipeline: direct

encoder:
  model_name: mental/mental-roberta-base
  num_labels: 5
  max_len: 128
  use_crf: true
  dropout: 0.1

loss:
  type: ce  # placeholder; CRF uses NLL internally.

optimizer:
  base_lr: 2.0e-5
  weight_decay: 0.01
  use_llrd: true
  llrd_decay: 0.9

training:
  epochs: 2
  batch_size: 8
  eval_batch_size: 8
  warmup_ratio: 0.1
  grad_clip: 1.0
  seed: 42
  num_workers: 0
  bf16: true

data:
  train_path: datasets/new_train_data.csv
  dev_path:   datasets/new_dev_data.csv

output_dir: out/experiments/smoke_crf
