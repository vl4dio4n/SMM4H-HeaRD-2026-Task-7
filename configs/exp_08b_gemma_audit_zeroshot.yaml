# Exp 08b — Gemma-3-12B + audit + ZERO-SHOT.
# Encoder: reuses the 5-class DeBERTa+CRF from exp_04 (no re-training).
experiment_name: exp_08b_gemma_audit_zeroshot
pipeline: audit

encoder:
  model_name: microsoft/deberta-v3-base
  num_labels: 5
  max_len: 256
  use_crf: true
  dropout: 0.1

llm:
  kind: causal
  model_name: google/gemma-3-12b-it
  quantization: 4bit
  max_context_chars: 2000
  max_span_chars: 200

data:
  train_path: datasets/new_train_data.csv
  dev_path:   datasets/new_dev_data.csv

output_dir: out/experiments/exp_08b_gemma_audit_zeroshot
