experiment_name: exp_05a_two_stage
pipeline: two_stage

encoder:
  model_name: microsoft/deberta-v3-base
  num_labels: 3   # O / B-Impact / I-Impact (boundary only)
  max_len: 256
  use_crf: false
  dropout: 0.1

loss:
  type: focal
  gamma: 2.0

optimizer:
  base_lr: 3.0e-5
  weight_decay: 0.01
  use_llrd: true
  llrd_decay: 0.9

training:
  epochs: 20
  batch_size: 16
  eval_batch_size: 32
  warmup_ratio: 0.1
  grad_clip: 1.0
  seed: 42
  num_workers: 2
  bf16: false   # DeBERTa-v3 is unstable under bf16 autocast (NaN losses); train in fp32.

llm:
  kind: causal
  # Any HF chat-template causal LM works here (Qwen, Gemma, Llama, Mistral, …).
  # Qwen-2.5-7B in 4-bit fits a 16 GB GPU and is ungated.
  model_name: Qwen/Qwen2.5-7B-Instruct
  quantization: 4bit
  max_context_chars: 2000
  max_span_chars: 200

data:
  train_path: datasets/new_train_data.csv
  dev_path:   datasets/new_dev_data.csv

output_dir: out/experiments/exp_05a_two_stage
